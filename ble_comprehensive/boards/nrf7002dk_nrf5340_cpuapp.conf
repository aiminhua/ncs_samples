# External SPI flash (no QSPI on nRF7002DK)
CONFIG_NORDIC_QSPI_NOR=n
CONFIG_SPI=y
CONFIG_SPI_NOR=y
CONFIG_SPI_NOR_FLASH_LAYOUT_PAGE_SIZE=4096

# UART1 high-speed async (1 Mbps)
CONFIG_UART_0_ASYNC=n
CONFIG_UART_1_ASYNC=y
CONFIG_UART_1_NRF_HW_ASYNC=y
CONFIG_UART_1_NRF_HW_ASYNC_TIMER=1

## NVS flash storage backend
CONFIG_SAMPLE_FLASH_NVS=y
CONFIG_NVS=y
