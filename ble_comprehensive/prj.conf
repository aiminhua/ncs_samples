CONFIG_NCS_SAMPLES_DEFAULTS=y

## Logging
CONFIG_LOG=y
CONFIG_LOG_MODE_DEFERRED=y
CONFIG_PRINTK=y
CONFIG_LOG_PRINTK=n
CONFIG_LOG_BUFFER_SIZE=8192
CONFIG_EARLY_CONSOLE=y

## Peripherals
CONFIG_GPIO=y
CONFIG_DK_LIBRARY=y
CONFIG_I2C=y
CONFIG_SERIAL=y
CONFIG_UART_ASYNC_API=y
CONFIG_UART_USE_RUNTIME_CONFIGURE=y
CONFIG_NRFX_GPPI=y
CONFIG_CLOCK_CONTROL=y
CONFIG_SPI=y
CONFIG_ADC=y
CONFIG_ADC_ASYNC=y
CONFIG_ADC_NRFX_SAADC=y

## Flash / Storage
CONFIG_FLASH=y
CONFIG_FLASH_PAGE_LAYOUT=y
CONFIG_FLASH_MAP=y
CONFIG_MPU_ALLOW_FLASH_WRITE=y
CONFIG_SETTINGS=y

## Bluetooth
CONFIG_BT=y
CONFIG_BT_PERIPHERAL=y
CONFIG_BT_DEVICE_NAME="comprehensive"
CONFIG_BT_NUS=y

## Active feature examples
CONFIG_SAMPLE_I2C=y
CONFIG_SAMPLE_EXT_INT=y
CONFIG_SAMPLE_HS_UART=y
CONFIG_SAMPLE_SPIM=y
CONFIG_SAMPLE_ADC=y
CONFIG_SAMPLE_FLASH_SETTINGS=y

## Power Management
CONFIG_PM_DEVICE=y

## Thread Monitor
CONFIG_THREAD_ANALYZER=y
CONFIG_THREAD_NAME=y

## Stack / Heap Sizing
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=4096
CONFIG_HEAP_MEM_POOL_SIZE=12288
CONFIG_MAIN_STACK_SIZE=2048
