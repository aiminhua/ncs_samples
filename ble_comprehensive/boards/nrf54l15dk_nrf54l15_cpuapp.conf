# External SPI flash storage
CONFIG_NORDIC_QSPI_NOR=n
CONFIG_SPI=y
CONFIG_SPI_NOR=y
CONFIG_SPI_NOR_FLASH_LAYOUT_PAGE_SIZE=4096
CONFIG_NRF_RRAM_WRITE_BUFFER_SIZE=32

# ZMS settings backend (ZMS is auto-selected for RRAM, but these helpers are explicit)
CONFIG_SETTINGS_ZMS=y
CONFIG_ZMS_LOOKUP_CACHE=y
CONFIG_SAMPLE_FLASH_NVS=n

# High-speed UART on UART20
CONFIG_UART_20_ASYNC=y

